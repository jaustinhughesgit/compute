name: Install NPM Package

on:
  repository_dispatch:
    types: [install-npm-package]

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_PAT }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Validate requested package
        env:
          PACKAGE_NAME: ${{ github.event.client_payload.packageName }}
        run: |
          if [ -z "$PACKAGE_NAME" ]; then
            echo "::error::The repository dispatch payload did not include packageName"
            exit 1
          fi
          if [[ ! "$PACKAGE_NAME" =~ ^(@[a-z0-9._-]+/)?[a-z0-9._-]+(@[^[:space:]]+)?$ ]]; then
            echo "::error::packageName must be an npm registry package with an optional version or tag"
            exit 1
          fi

      - name: Install npm package
        working-directory: app
        env:
          PACKAGE_NAME: ${{ github.event.client_payload.packageName }}
        run: npm install --save -- "$PACKAGE_NAME"

      - name: Zip node_modules
        working-directory: app/node_modules
        run: |
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Upload changed module archives to S3
        working-directory: app/node_modules
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          if [ -z "$AWS_S3_BUCKET" ]; then
            echo "::error::GitHub Actions secret AWS_S3_BUCKET is not configured"
            exit 1
          fi

          for zipFile in *.zip; do
            echo "Checking whether $zipFile needs to be uploaded..."
            localSize="$(stat -c%s "$zipFile")"
            remoteSize="$(aws s3 ls "s3://$AWS_S3_BUCKET/node_modules/$zipFile" | awk '{print $3}')"
            if [ "$localSize" != "$remoteSize" ]; then
              aws s3 cp "$zipFile" "s3://$AWS_S3_BUCKET/node_modules/$zipFile"
            else
              echo "$zipFile is already current."
            fi
          done

      - name: Commit and push dependency changes
        env:
          PACKAGE_NAME: ${{ github.event.client_payload.packageName }}
        run: |
          git config user.name "Lambda_Github"
          git config user.email "jaustinhughes@outlook.com"
          git add app/package.json app/package-lock.json
          if git diff --cached --quiet; then
            echo "No dependency changes to commit."
            exit 0
          fi
          git commit -m "Install $PACKAGE_NAME npm package"
          git push
