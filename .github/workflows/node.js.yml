name: Compute CI and deploy

on:
  push:
    branches: ["master"]

concurrency:
  group: compute-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install Compute dependencies
        working-directory: app
        run: npm ci

      - name: Validate Compute template
        run: sam validate --lint --template-file template.yaml

      - name: Build Compute stack
        run: sam build --template-file template.yaml

      - name: Verify SAM artifact
        run: |
          test -f .aws-sam/build/ComputeFunction/app.js
          test -f .aws-sam/build/ComputeFunction/routes/placeholderTransport.js
          test -f .aws-sam/build/ComputeFunction/routes/modules/runEntity.js
          test -f .aws-sam/build/ComputeFunction/routes/modules/protectedAssets.js
          grep -q 'preserveExactPlaceholderValue' .aws-sam/build/ComputeFunction/app.js
          grep -q 'normalizeEntityTransportResult' .aws-sam/build/ComputeFunction/routes/modules/runEntity.js
          grep -q 'protectedAssetExecutorKey' .aws-sam/build/ComputeFunction/routes/modules/protectedAssets.js

      - name: Deploy Compute stack
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::GitHub Actions secret OPENAI_API_KEY is not configured"
            exit 1
          fi
          if [ -z "$SESSION_SECRET" ]; then
            echo "::error::GitHub Actions secret SESSION_SECRET is not configured"
            exit 1
          fi

          sam deploy \
            --config-file samconfig.toml \
            --config-env default \
            --stack-name compute \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides \
              "OpenAIApiKey=$OPENAI_API_KEY" \
              "SessionSecret=$SESSION_SECRET" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Verify Protected Asset infrastructure
        run: |
          FUNCTION_NAME="$(aws cloudformation describe-stack-resource \
            --stack-name compute \
            --logical-resource-id ComputeFunction \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text)"
          test -n "$FUNCTION_NAME"
          test "$FUNCTION_NAME" != "None"

          OPENAI_API_KEY="$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Environment.Variables.OPENAI_API_KEY' \
            --output text)"
          test -n "$OPENAI_API_KEY"
          test "$OPENAI_API_KEY" != "None"
          unset OPENAI_API_KEY

          SESSION_SECRET="$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Environment.Variables.SESSION_SECRET' \
            --output text)"
          test -n "$SESSION_SECRET"
          test "$SESSION_SECRET" != "None"
          unset SESSION_SECRET

          KMS_KEY_ID="$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Environment.Variables.PROTECTED_ASSET_KMS_KEY_ID' \
            --output text)"
          test -n "$KMS_KEY_ID"
          test "$KMS_KEY_ID" != "None"
          aws kms get-public-key --key-id "$KMS_KEY_ID" --query 'KeyId' --output text

          aws cloudformation describe-stack-resource \
            --stack-name compute \
            --logical-resource-id ProtectedAssetsTable \
            --query 'StackResourceDetail.ResourceStatus' \
            --output text | grep -Eq 'CREATE_COMPLETE|UPDATE_COMPLETE'

          aws cloudformation describe-stack-resource \
            --stack-name compute \
            --logical-resource-id ProtectedAssetAuditTable \
            --query 'StackResourceDetail.ResourceStatus' \
            --output text | grep -Eq 'CREATE_COMPLETE|UPDATE_COMPLETE'
